<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hana Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body data-page="home">
  <header class="topbar">
    <a class="brand" href="/">Hana Reader</a>
    <nav><a class="active" href="/">Inicio</a></nav>
  </header>

  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Biblioteca privada em PT-BR</p>
      <h1>Leia manhwas e mangas sem cadastro, rapido e limpo.</h1>
      <form class="search" id="searchForm">
        <input id="searchInput" placeholder="Buscar por titulo..." autocomplete="off">
        <button>Buscar</button>
      </form>
    </section>

    <section class="filters" aria-label="Filtros">
      <div>
        <label for="tagSelect">Categoria</label>
        <select id="tagSelect"><option value="">Todas</option></select>
      </div>
      <div>
        <label>Letra</label>
        <div class="letters" id="letters"></div>
      </div>
    </section>

    <section>
      <div class="section-head">
        <h2 id="sectionTitle">Popular agora</h2>
        <button class="ghost" id="clearBtn" hidden>Limpar</button>
      </div>
      <div class="grid" id="mangaGrid"></div>
      <div class="pager" id="pager"></div>
    </section>
  </main>

  <footer>Hana Reader - leitor privado usando MangaDex.</footer>
  <script src="/static/js/main.js"></script>
</body>
</html>
