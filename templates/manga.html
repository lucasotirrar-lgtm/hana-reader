<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hana Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body data-page="manga" data-manga-id="{{ manga_id }}">
  <header class="topbar">
    <a class="brand" href="/">Hana Reader</a>
    <nav><a href="/">Inicio</a></nav>
  </header>

  <main class="shell">
    <a class="back" href="/">Voltar</a>
    <section class="manga-panel" id="mangaPanel"></section>
    <section class="chapters">
      <div class="section-head">
        <h2>Capitulos em PT-BR</h2>
        <span id="chapterCount"></span>
      </div>
      <div id="chaptersList"></div>
    </section>
  </main>

  <footer>Hana Reader - leitor privado usando MangaDex.</footer>
  <script src="/static/js/main.js"></script>
</body>
</html>
