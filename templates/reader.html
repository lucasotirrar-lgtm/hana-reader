<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lendo | Hana Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="reader" data-page="reader" data-manga-id="{{ manga_id }}" data-chapter-id="{{ chapter_id }}">
  <header class="readerbar">
    <a class="brand" id="backManga" href="/">Hana</a>
    <div class="reader-actions">
      <button id="prevBtn" title="Pagina anterior">Anterior</button>
      <span id="progress">...</span>
      <button id="nextBtn" title="Proxima pagina">Proxima</button>
      <button id="modeBtn" title="Alternar modo">Scroll</button>
    </div>
  </header>

  <main id="readerStage" class="reader-stage"></main>
  <script src="/static/js/main.js"></script>
</body>
</html>
